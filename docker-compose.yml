services:
  postgres:
    image: postgres:15
    container_name: banking_postgres2
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  etl:
    build:
      context: .
      dockerfile: dashboard/Dockerfile  # we’ll use the same Dockerfile
    container_name: banking_etl2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      - postgres
    command: ["python3", "etl/load_from_csv.py"]

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile 
    container_name: banking_dashboard2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - etl
      
  airflow:
    image: apache/airflow:2.7.1
    container_name: banking_airflow
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'NV2LvlGOvt-SX6XbVqgwaJv4lN4RyX27EuzY59VeaAg='
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./etl:/app/etl
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Fiza --lastname Rooslan --role Admin --email admin@example.com &&
      airflow webserver & airflow scheduler
      "

volumes:
  postgres_data:
